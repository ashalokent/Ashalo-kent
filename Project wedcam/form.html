<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body style="font-family: Arial; background-color: hsl(200, 60%, 47%); padding: 20px;">

    <h2 style="text-align: center;">Registration Form</h2>

    <form style="background: white; padding: 20px; width: 300px; margin: auto; border: 1px solid #ccc; border-radius: 8px;">

        <label style="font-weight: bold;">Full Name:</label><br>
        <input type="text" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #aaa; border-radius: 4px;"><br>

        <label style="font-weight: bold;">Email:</label><br>
        <input type="email" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #aaa; border-radius: 4px;"><br>

        <label style="font-weight: bold;">Phone Number:</label><br>
        <input type="number" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #aaa; border-radius: 4px;"><br>

        <label style="font-weight: bold;">Password:</label><br>
        <input type="password" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #aaa; border-radius: 4px;"><br>
       
        <label style="font-weight: bold">Date of Birth</label><br>
        <input type="date" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #aaa; border-radius: 4px;"><br>

        <label style="font-weight: bold">Aadhar</label><br>
        <input type="text" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #aaa; border-radius: 4px;"><br>

        <label style="font-weight: bold;">Gender:</label><br>
        <select style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #aaa; border-radius: 4px;">
            <option>Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select><br>


        <button style="width: 100%; background-color: blue; color: white; padding: 10px; border: none; border-radius: 5px;">
            Register
        </button>

    </form>

</body>
</html>
