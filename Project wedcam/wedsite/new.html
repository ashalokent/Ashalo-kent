<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-image: url("kurumi.jpg");
            background-size: cover;        /* Makes image cover full screen */
            background-repeat: no-repeat;  /* Prevents repeating */
            background-position: center;   /* Centers the image */
            height: 100vh;
            margin: 0;
        }
    </style>

</head>
<body>
    
<head>
    <title>Login Page</title>
    <style>
        body {

            display: flex;
            justify-content: center;
            align-items: center;


        .login-box {
            background:color(srgb rgb(199, 180, 180) rgb(93, 180, 93) rgb(102, 102, 135)))transparent=90;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            width: 300px;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    background-color: #07bfed;
    transform: scale(1.1);
;
        }

        .login-box button:hover 

        .login-box p {
            text-align: center;
            margin-top: 15px;
        }

        .login-box a {
            color: #4facfe;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Login</h2>
        <form>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="#">Sign up</a></p>
    </div>
