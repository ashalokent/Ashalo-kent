<!DOCTYPE html>
<html>
    <head>
        <title> Inline CSS</title>  
        <style>
            h1{
                color: cadetblue;
            }
        </style>
    </head>       
    <body style="font-size: 30px;">
        <h1 style="color: rgb(25, 0, 255);">Example of Radio button and CheckBox</h1>
        <h1>Select Gender:</h1>
        <input type="radio" name="Gender"> Male <br>
        <input type="radio" name="Gender"> Female <br>
        <input type="radio" name="Gender"> Others <br>
        
        <h1>Select Skills:</h1>
        <input type="checkbox" name="Skills"> HTML <br>
        <input type="checkbox" name="Skills"> CSS <br>
        <input type="checkbox" name="Skills"> PYTHON <br>
        <input type="checkbox" name="Skills"> Network <br>
</body>
     
            
    </body>
</html>
